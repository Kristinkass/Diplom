<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовая карта</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        .floor-plan-container {
            background: #1e2937;
            border: 5px solid #334155;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px;
        }
        .place-zone {
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .place-zone:hover {
            filter: brightness(1.25);
        }
        .place-zone.free {
            fill: #22c55e;
            fill-opacity: 0.35;
        }
        .place-zone.occupied {
            fill: #ef4444;
            fill-opacity: 0.45;
        }
        .place-label {
            font-size: 14px;
            font-weight: bold;
            fill: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Тестовая интерактивная карта</h1>
        <p>Кликни по зоне. Можно перетаскивать (зажми мышкой).</p>

        <div class="floor-plan-container">
            <svg id="floor-plan" viewBox="0 0 2202 1211">
                <!-- Твоя карта как фон -->
                <image href="/static/office_map.svg" width="2202" height="1211" opacity="0.98"/>

                <!-- Слой зон -->
                <g id="zones-layer"></g>
            </svg>
        </div>
    </div>

    <script>
        let places = [
            {id: 1, name: "Стол 1", type: "desk", status: "free", x: 300, y: 200},
            {id: 2, name: "Стол 2", type: "desk", status: "occupied", x: 450, y: 200},
            {id: 3, name: "Переговорная A", type: "room", status: "free", x: 800, y: 150},
            {id: 4, name: "Офис 1", type: "office", status: "free", x: 1200, y: 400},
            // Добавляй остальные места...
        ];

        function renderZones() {
            const layer = document.getElementById('zones-layer');
            layer.innerHTML = '';

            places.forEach(place => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.classList.add('place-zone');
                if (place.status === 'occupied') g.classList.add('occupied');
                else g.classList.add('free');

                // Прямоугольник-зона
                const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                rect.setAttribute("x", place.x);
                rect.setAttribute("y", place.y);
                rect.setAttribute("width", 200);
                rect.setAttribute("height", 250);
                rect.setAttribute("rx", 12);
                g.appendChild(rect);

                // Название
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", place.x + 60);
                text.setAttribute("y", place.y + 55);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("class", "place-label");
                text.textContent = place.name;
                g.appendChild(text);

                // Клик
                g.addEventListener('click', () => {
                    alert(`Выбрано: ${place.name}\nСтатус: ${place.status === 'free' ? 'Свободно' : 'Занято'}`);
                });

                // Перетаскивание
                makeDraggable(g, place);

                layer.appendChild(g);
            });
        }

        function makeDraggable(element, place) {
            let offsetX, offsetY;

            element.addEventListener('mousedown', (e) => {
                const svg = document.getElementById('floor-plan');
                const pt = svg.createSVGPoint();
                pt.x = e.clientX;
                pt.y = e.clientY;
                const cursor = pt.matrixTransform(svg.getScreenCTM().inverse());

                offsetX = cursor.x - place.x;
                offsetY = cursor.y - place.y;

                function move(ev) {
                    const pt2 = svg.createSVGPoint();
                    pt2.x = ev.clientX;
                    pt2.y = ev.clientY;
                    const cursor2 = pt2.matrixTransform(svg.getScreenCTM().inverse());
                    place.x = cursor2.x - offsetX;
                    place.y = cursor2.y - offsetY;
                    renderZones();
                }

                function stop() {
                    document.removeEventListener('mousemove', move);
                    document.removeEventListener('mouseup', stop);
                    console.log(`Новое положение ${place.name}: x=${place.x}, y=${place.y}`);
                }

                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', stop);
            });
        }

        // Запуск
        renderZones();
    </script>
</body>
</html>
