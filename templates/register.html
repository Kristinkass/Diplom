{% extends "base.html" %}

{% block title %}Регистрация - Умный Коворкинг{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1><i class="fas fa-user-plus"></i> Регистрация</h1>
            <p>Создайте новый аккаунт</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email *</label>
                <input type="email" id="email" name="email" required 
                       placeholder="ваш@email.com" class="form-control">
            </div>
            
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Имя пользователя *</label>
                <input type="text" id="username" name="username" required 
                       placeholder="Ваше имя" class="form-control">
            </div>
            
            <div class="form-group">
                <label for="phone"><i class="fas fa-phone"></i> Телефон</label>
                <input type="tel" id="phone" name="phone" 
                       placeholder="+7 (___) ___-__-__" class="form-control"
                       pattern="\+7\s?[\(]?\d{3}[\)]?\s?\d{3}[\-]?\d{2}[\-]?\d{2}"
                       title="Введите номер телефона в формате: +7 (999) 123-45-67">
            </div>


            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Пароль *</label>
                <input type="password" id="password" name="password" required
                       placeholder="Минимум 6 символов" class="form-control">
                <small class="form-text">Пароль должен содержать не менее 6 символов</small>
            </div>

            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-lock"></i> Подтвердите пароль *</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       placeholder="Повторите пароль" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>

            <div class="auth-links">
                <p>Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('.auth-form');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    const phoneInput = document.getElementById('phone');

    // Маска для телефона
    phoneInput.addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');

        // Если начинается с 7, 8 или 9 (российский номер)
        if (value.length > 0) {
            // Ограничиваем до 11 цифр (10 без +7)
            value = value.substring(0, 11);

            // Форматируем номер
            let formattedValue = '+7';

            if (value.length > 1) {
                // Убираем первую 7 если она есть (уже добавили +7)
                if (value.startsWith('7')) {
                    value = value.substring(1);
                } else if (value.startsWith('8')) {
                    value = value.substring(1);
                }

                // Добавляем оставшиеся цифры с форматированием
                if (value.length > 0) {
                    formattedValue += ' (' + value.substring(0, 3);
                }
                if (value.length > 3) {
                    formattedValue += ') ' + value.substring(3, 6);
                }
                if (value.length > 6) {
                    formattedValue += '-' + value.substring(6, 8);
                }
                if (value.length > 8) {
                    formattedValue += '-' + value.substring(8, 10);
                }
            }

            e.target.value = formattedValue;

            // Позиционируем курсор в конец
            setTimeout(() => {
                e.target.setSelectionRange(formattedValue.length, formattedValue.length);
            }, 0);
        }
    });


    // Удаление символов с конца при нажатии Backspace
    phoneInput.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace') {
            let value = e.target.value;

            // Если последний символ - разделитель, удаляем его тоже
            if (value.length > 0 && /[()\s\-]/.test(value[value.length - 1])) {
                e.preventDefault();
                e.target.value = value.substring(0, value.length - 1);

                // Перемещаем курсор в конец
                setTimeout(() => {
                    e.target.setSelectionRange(e.target.value.length, e.target.value.length);
                }, 0);
            }
        }
    });

    // Валидация формы
    form.addEventListener('submit', function(e) {
        // Проверка пароля
        if (password.value !== confirmPassword.value) {
            e.preventDefault();
            alert('Пароли не совпадают!');
            confirmPassword.focus();
            return false;
        }

        if (password.value.length < 6) {
            e.preventDefault();
            alert('Пароль должен содержать не менее 6 символов!');
            password.focus();
            return false;
        }

        // Опциональная проверка телефона
        if (phoneInput.value && phoneInput.value.length > 0) {
            // Проверяем, что введено минимум 10 цифр (без +7)
            const digits = phoneInput.value.replace(/\D/g, '');
            if (digits.length < 10) {
                e.preventDefault();
                alert('Пожалуйста, введите корректный номер телефона (10 цифр после +7)');
                phoneInput.focus();
                return false;
            }
        }
    });

    // Фокус на поле телефона с очисткой плейсхолдера
    phoneInput.addEventListener('focus', function() {
        if (this.value === '' || this.value === '+7 (') {
            this.value = '+7 (';
        }
    });

    // Если поле пустое при потере фокуса - очищаем
    phoneInput.addEventListener('blur', function() {
        if (this.value === '+7 (' || this.value === '+7') {
            this.value = '';
        }
    });
});
</script>
{% endblock %}
